name: update-satasite
env:
  EVENT: build-animetoanime
on: 
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  dispatch-satasite:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT }}
          repository: satasatalight/satasite
          event-type: ${{ env.EVENT }}
